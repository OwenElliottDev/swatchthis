<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>swatchthis – video demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0e0e10;
    color: #e4e4e7;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: #a1a1aa;
    margin-bottom: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: #1c1c1f;
    border: 1px solid #2e2e32;
    border-radius: 6px;
    color: #e4e4e7;
    font-size: 0.9rem;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #6366f1;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #6366f1;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .range-row input[type="range"] { flex: 1; }

  .range-value {
    font-size: 0.9rem;
    font-family: monospace;
    color: #e4e4e7;
    min-width: 2.5em;
    text-align: center;
  }

  .drop-zone {
    border: 2px dashed #2e2e32;
    border-radius: 8px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    font-size: 0.9rem;
    color: #71717a;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: #6366f1;
    color: #a5b4fc;
  }

  .drop-zone input[type="file"] { display: none; }

  .main-area {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .video-container {
    position: relative;
    background: #1c1c1f;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
  }

  .video-container video {
    max-width: 100%;
    max-height: 500px;
    display: block;
  }

  .placeholder-text {
    color: #3f3f46;
    font-size: 0.9rem;
  }

  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    min-height: 100px;
    transition: opacity 0.15s;
  }

  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .swatch-color {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    border: 1px solid #2e2e32;
    transition: background-color 0.3s ease;
  }

  .swatch-label {
    font-size: 0.75rem;
    font-family: monospace;
    color: #a1a1aa;
  }

  .swatch-pop {
    font-size: 0.65rem;
    color: #52525b;
  }

  .swatch-pair {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .swatch-pair .swatch-color {
    width: 72px;
    height: 36px;
  }

  .swatch-pair .swatch-color:first-child {
    border-radius: 8px 8px 0 0;
  }

  .swatch-pair .swatch-color:nth-child(2) {
    border-radius: 0 0 8px 8px;
  }

  .complement-label {
    font-size: 0.65rem;
    font-family: monospace;
    color: #71717a;
  }

  .status {
    font-size: 0.8rem;
    color: #71717a;
    min-height: 1.2em;
  }

  .error { color: #f87171; }

  .fps-display {
    font-size: 0.75rem;
    font-family: monospace;
    color: #6366f1;
    min-height: 1.2em;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <h1>swatchthis video</h1>

    <div class="drop-zone" id="dropZone">
      <p>Drop a video here or click to upload</p>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <div>
      <label for="urlInput">Or paste a video URL</label>
      <input type="text" id="urlInput" placeholder="https://example.com/video.mp4">
    </div>

    <div>
      <label for="preprocessorSelect">Preprocessor</label>
      <select id="preprocessorSelect">
        <option value="none" selected>None</option>
        <option value="slic">SLIC</option>
        <option value="seeds">SEEDS</option>
      </select>
    </div>

    <div class="slic-only" style="display:none">
      <label for="slicSuperpixels">Superpixels</label>
      <div class="range-row">
        <input type="range" id="slicSuperpixels" value="200" min="10" max="1000" step="10">
        <span class="range-value" id="slicSuperpixelsValue">200</span>
      </div>
    </div>

    <div class="slic-only" style="display:none">
      <label for="slicCompactness">Compactness</label>
      <div class="range-row">
        <input type="range" id="slicCompactness" value="20" min="1" max="80" step="1">
        <span class="range-value" id="slicCompactnessValue">20</span>
      </div>
    </div>

    <div class="seeds-only" style="display:none">
      <label for="seedsSuperpixels">Superpixels</label>
      <div class="range-row">
        <input type="range" id="seedsSuperpixels" value="200" min="10" max="1000" step="10">
        <span class="range-value" id="seedsSuperpixelsValue">200</span>
      </div>
    </div>

    <div class="seeds-only" style="display:none">
      <label for="seedsLevels">Levels</label>
      <div class="range-row">
        <input type="range" id="seedsLevels" value="3" min="1" max="8" step="1">
        <span class="range-value" id="seedsLevelsValue">3</span>
      </div>
    </div>

    <div class="seeds-only" style="display:none">
      <label for="seedsBins">Histogram bins</label>
      <div class="range-row">
        <input type="range" id="seedsBins" value="5" min="2" max="10" step="1">
        <span class="range-value" id="seedsBinsValue">5</span>
      </div>
    </div>

    <div>
      <label for="algorithmSelect">Algorithm</label>
      <select id="algorithmSelect">
        <option value="median-cut" selected>Median Cut</option>
        <option value="kmeans">K-Means</option>
        <option value="octree">Octree</option>
      </select>
    </div>

    <div>
      <label for="countInput">Swatch count</label>
      <input type="number" id="countInput" value="6" min="1">
    </div>

    <div class="color-space-option">
      <label for="colorSpaceSelect">Colour space</label>
      <select id="colorSpaceSelect">
        <option value="lab" selected>CIELAB</option>
        <option value="lab-ciede2000" class="kmeans-only">CIELAB (CIEDE2000)</option>
        <option value="rgb">RGB</option>
      </select>
    </div>

    <div class="kmeans-only" style="display:none">
      <label for="initSelect">Initialisation</label>
      <select id="initSelect">
        <option value="kmeans++" selected>K-Means++</option>
        <option value="random">Random</option>
      </select>
    </div>

    <div class="kmeans-only" style="display:none">
      <label for="seedInput">Seed</label>
      <input type="number" id="seedInput" value="42" min="0">
    </div>

    <div class="octree-only" style="display:none">
      <label for="maxDepthInput">Max depth</label>
      <div class="range-row">
        <input type="range" id="maxDepthInput" value="6" min="1" max="8" step="1">
        <span class="range-value" id="maxDepthValue">6</span>
      </div>
    </div>

    <div>
      <label for="fpsInput">Extract rate</label>
      <div class="range-row">
        <input type="range" id="fpsInput" value="5" min="1" max="30" step="1">
        <span class="range-value" id="fpsValue">5</span>
        <span style="font-size:0.8rem;color:#71717a">fps</span>
      </div>
    </div>

    <div>
      <label style="display:inline;text-transform:none;color:#e4e4e7;font-size:0.9rem">
        <input type="checkbox" id="complementToggle"> Show complementary colours
      </label>
    </div>

    <div class="status" id="status"></div>
    <div class="fps-display" id="fpsDisplay"></div>
  </div>

  <div class="main-area">
    <div class="video-container" id="videoContainer">
      <span class="placeholder-text">No video loaded</span>
      <video id="video" style="display:none" controls></video>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
    <div class="swatches" id="swatchContainer"></div>
  </div>
</div>

<script type="module">
  import init, { generateSwatches, generateSwatchesOctree, generateSwatchesMedianCut, complementaryColor, slicPreprocess, seedsPreprocess } from './pkg/swatchthis.js';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const urlInput = document.getElementById('urlInput');
  const preprocessorSelect = document.getElementById('preprocessorSelect');
  const algorithmSelect = document.getElementById('algorithmSelect');
  const countInput = document.getElementById('countInput');
  const colorSpaceSelect = document.getElementById('colorSpaceSelect');
  const initSelect = document.getElementById('initSelect');
  const seedInput = document.getElementById('seedInput');
  const maxDepthInput = document.getElementById('maxDepthInput');
  const maxDepthValue = document.getElementById('maxDepthValue');
  const fpsInput = document.getElementById('fpsInput');
  const fpsValue = document.getElementById('fpsValue');
  const complementToggle = document.getElementById('complementToggle');
  const status = document.getElementById('status');
  const fpsDisplay = document.getElementById('fpsDisplay');
  const video = document.getElementById('video');
  const videoContainer = document.getElementById('videoContainer');
  const canvas = document.getElementById('canvas');
  const swatchContainer = document.getElementById('swatchContainer');
  const ctx = canvas.getContext('2d');

  const slicSuperpixels = document.getElementById('slicSuperpixels');
  const slicSuperpixelsValue = document.getElementById('slicSuperpixelsValue');
  const slicCompactness = document.getElementById('slicCompactness');
  const slicCompactnessValue = document.getElementById('slicCompactnessValue');
  const seedsSuperpixels = document.getElementById('seedsSuperpixels');
  const seedsSuperpixelsValue = document.getElementById('seedsSuperpixelsValue');
  const seedsLevels = document.getElementById('seedsLevels');
  const seedsLevelsValue = document.getElementById('seedsLevelsValue');
  const seedsBins = document.getElementById('seedsBins');
  const seedsBinsValue = document.getElementById('seedsBinsValue');

  slicSuperpixels.addEventListener('input', () => { slicSuperpixelsValue.textContent = slicSuperpixels.value; });
  slicCompactness.addEventListener('input', () => { slicCompactnessValue.textContent = slicCompactness.value; });
  seedsSuperpixels.addEventListener('input', () => { seedsSuperpixelsValue.textContent = seedsSuperpixels.value; });
  seedsLevels.addEventListener('input', () => { seedsLevelsValue.textContent = seedsLevels.value; });
  seedsBins.addEventListener('input', () => { seedsBinsValue.textContent = seedsBins.value; });

  // --- Preprocessor controls ---

  function updatePreprocessorControls() {
    const pp = preprocessorSelect.value;
    document.querySelectorAll('.slic-only').forEach(el => el.style.display = pp === 'slic' ? '' : 'none');
    document.querySelectorAll('.seeds-only').forEach(el => el.style.display = pp === 'seeds' ? '' : 'none');
  }

  preprocessorSelect.addEventListener('change', updatePreprocessorControls);
  updatePreprocessorControls();

  // --- Algorithm controls ---

  function updateAlgorithmControls() {
    const algo = algorithmSelect.value;
    document.querySelectorAll('.kmeans-only').forEach(el => el.style.display = algo === 'kmeans' ? '' : 'none');
    document.querySelectorAll('.octree-only').forEach(el => el.style.display = algo === 'octree' ? '' : 'none');
    document.querySelectorAll('.color-space-option').forEach(el => el.style.display = algo === 'median-cut' ? 'none' : '');

    if (algo !== 'kmeans' && colorSpaceSelect.value === 'lab-ciede2000') {
      colorSpaceSelect.value = 'lab';
    }
  }

  algorithmSelect.addEventListener('change', updateAlgorithmControls);
  updateAlgorithmControls();

  maxDepthInput.addEventListener('input', () => { maxDepthValue.textContent = maxDepthInput.value; });
  fpsInput.addEventListener('input', () => { fpsValue.textContent = fpsInput.value; });

  // --- WASM init ---

  let wasmReady = false;

  try {
    await init();
    wasmReady = true;
    status.textContent = 'WASM loaded. Load a video to begin.';
  } catch (e) {
    status.textContent = 'Failed to load WASM. Did you run build.sh?';
    status.classList.add('error');
    console.error(e);
  }

  // --- Video loading ---

  function loadVideo(src) {
    video.src = src;
    video.style.display = 'block';
    videoContainer.querySelector('.placeholder-text')?.remove();
    status.textContent = 'Video loaded. Press play to extract colours.';
    status.classList.remove('error');
  }

  function loadFile(file) {
    if (!file || !file.type.startsWith('video/')) return;
    loadVideo(URL.createObjectURL(file));
  }

  function loadURL(url) {
    if (!url) return;
    status.textContent = 'Loading video...';
    status.classList.remove('error');
    video.crossOrigin = 'anonymous';
    loadVideo(url);
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadURL(urlInput.value.trim()); });

  // --- Real-time extraction loop ---

  let extractionTimer = null;
  let lastExtractTime = 0;

  function extractFrame() {
    if (!wasmReady || video.paused || video.ended || video.videoWidth === 0) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const rgba = imageData.data;

    const algo = algorithmSelect.value;
    const count = Math.max(1, parseInt(countInput.value) || 6);
    const colorSpace = colorSpaceSelect.value;

    try {
      const t0 = performance.now();

      // Optional preprocessing
      const pp = preprocessorSelect.value;
      let inputRgba = rgba;
      if (pp === 'slic') {
        inputRgba = slicPreprocess(rgba, canvas.width, canvas.height,
          parseInt(slicSuperpixels.value) || 200, parseFloat(slicCompactness.value) || 20);
      } else if (pp === 'seeds') {
        inputRgba = seedsPreprocess(rgba, canvas.width, canvas.height,
          parseInt(seedsSuperpixels.value) || 200, parseInt(seedsLevels.value) || 3, parseInt(seedsBins.value) || 5);
      }

      let json;
      if (algo === 'octree') {
        const maxDepth = parseInt(maxDepthInput.value) || 6;
        json = generateSwatchesOctree(inputRgba, count, colorSpace, maxDepth);
      } else if (algo === 'median-cut') {
        json = generateSwatchesMedianCut(inputRgba, count);
      } else {
        const initMethod = initSelect.value;
        const seed = BigInt(Math.max(0, parseInt(seedInput.value) || 0));
        json = generateSwatches(inputRgba, count, colorSpace, initMethod, seed);
      }
      const elapsed = performance.now() - t0;
      lastExtractTime = elapsed;

      const swatches = JSON.parse(json);
      renderSwatches(swatches);
      fpsDisplay.textContent = `${elapsed.toFixed(1)}ms per frame`;
    } catch (e) {
      fpsDisplay.textContent = `Error: ${e.message}`;
      console.error(e);
    }
  }

  function startExtraction() {
    stopExtraction();
    const fps = parseInt(fpsInput.value) || 5;
    const interval = 1000 / fps;
    extractionTimer = setInterval(extractFrame, interval);
    extractFrame();
    status.textContent = `Extracting at ${fps} fps...`;
    status.classList.remove('error');
  }

  function stopExtraction() {
    if (extractionTimer !== null) {
      clearInterval(extractionTimer);
      extractionTimer = null;
    }
  }

  video.addEventListener('play', startExtraction);
  video.addEventListener('pause', () => {
    stopExtraction();
    status.textContent = 'Paused.';
  });
  video.addEventListener('ended', () => {
    stopExtraction();
    status.textContent = 'Video ended.';
  });
  video.addEventListener('seeked', () => {
    if (video.paused) extractFrame();
  });

  // Restart extraction when fps changes during playback
  fpsInput.addEventListener('change', () => {
    if (!video.paused && !video.ended) startExtraction();
  });

  // --- Rendering ---

  let lastSwatches = [];

  complementToggle.addEventListener('change', () => {
    if (lastSwatches.length > 0) renderSwatches(lastSwatches);
  });

  function renderSwatches(swatches) {
    lastSwatches = swatches;
    const totalPop = swatches.reduce((s, sw) => s + sw.population, 0);
    const showComp = complementToggle.checked;

    // Reuse existing DOM nodes when count hasn't changed to enable smooth CSS transitions
    const needsRebuild = swatchContainer.children.length !== swatches.length ||
      swatchContainer.dataset.mode !== (showComp ? 'comp' : 'normal');

    if (needsRebuild) {
      swatchContainer.innerHTML = '';
      swatchContainer.dataset.mode = showComp ? 'comp' : 'normal';

      for (let i = 0; i < swatches.length; i++) {
        const div = document.createElement('div');
        if (showComp) {
          div.className = 'swatch swatch-pair';
          div.innerHTML = `
            <div class="swatch-color" data-role="main"></div>
            <div class="swatch-color" data-role="comp"></div>
            <span class="swatch-label" data-role="main-label"></span>
            <span class="complement-label" data-role="comp-label"></span>
            <span class="swatch-pop"></span>
          `;
        } else {
          div.className = 'swatch';
          div.innerHTML = `
            <div class="swatch-color" data-role="main"></div>
            <span class="swatch-label" data-role="main-label"></span>
            <span class="swatch-pop"></span>
          `;
        }
        swatchContainer.appendChild(div);
      }
    }

    // Update values in place
    const children = swatchContainer.children;
    for (let i = 0; i < swatches.length; i++) {
      const sw = swatches[i];
      const pct = ((sw.population / totalPop) * 100).toFixed(1);
      const el = children[i];

      el.querySelector('[data-role="main"]').style.background = sw.hex;
      el.querySelector('[data-role="main-label"]').textContent = sw.hex;
      el.querySelector('.swatch-pop').textContent = `${pct}%`;

      if (showComp) {
        const comp = complementaryColor(sw.r, sw.g, sw.b);
        const compHex = `#${comp[0].toString(16).padStart(2,'0')}${comp[1].toString(16).padStart(2,'0')}${comp[2].toString(16).padStart(2,'0')}`;
        el.querySelector('[data-role="comp"]').style.background = compHex;
        el.querySelector('[data-role="comp-label"]').textContent = compHex;
      }
    }
  }
</script>
</body>
</html>
