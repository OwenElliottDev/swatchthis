name: Publish WASM

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0

      - run: wasm-pack build --target web --features wasm

      - name: Publish to wasm-dist branch with version tag
        run: |
          VERSION=${{ github.ref_name }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan wasm-dist
          git rm -rf .
          cp pkg/swatchthis.js pkg/swatchthis.d.ts pkg/swatchthis_bg.wasm .
          git add swatchthis.js swatchthis.d.ts swatchthis_bg.wasm
          git commit -m "WASM build ${VERSION}"
          git tag "wasm-${VERSION}"
          git push -f origin wasm-dist
          git push origin "wasm-${VERSION}"
